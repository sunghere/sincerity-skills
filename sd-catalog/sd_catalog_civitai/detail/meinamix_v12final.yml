      denoising_strength: [0.3, 0.6]
      notes: "Needed for far-away character prompts to improve face and eye quality."
    clip_skip:
      recommended: 2
    quantization:
      recommended: true
      notes: "Enable Quantization in K samplers."

  prompting:
    negative_prompt:
      recommended: "(worst quality, low quality), (zombie, interlocked fingers)"
      without_hires_fix: "(worst quality:1.6, low quality:1.6), (zombie, sketch, interlocked fingers, comic)"

  raw_notes: |
    Base Model: SD 1.5.
    Hires.fix drastically improves quality of face and eyes when the character is far away.
